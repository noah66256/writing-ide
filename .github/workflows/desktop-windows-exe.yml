name: Desktop Windows EXE

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "nsis"
        type: choice
        options:
          - nsis
          - portable
          - all

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        # package-lock 含 macOS optional deps（@rollup/rollup-darwin-arm64 等）
        # --force 跳过平台检查，Windows 平台的 optional deps 会正确安装
        run: npm install --force --no-audit --no-fund

      - name: Clean output
        run: if (Test-Path apps/desktop/out) { Remove-Item -Recurse -Force apps/desktop/out }
        shell: pwsh

      - name: Build workspace packages
        shell: bash
        run: |
          # 所有 workspace 包都需要 tsc 编译出 dist/，desktop build 只自动编译 agent-core
          npm run -w @ohmycrab/shared build || true
          npm run -w @ohmycrab/tools build || true
          npm run -w @ohmycrab/kb-core build || true

      - name: Prepare MCP runtime
        shell: bash
        run: |
          set -euo pipefail
          npm run -w @ohmycrab/desktop mcp:prepare-runtime

      - name: Build EXE
        shell: bash
        run: |
          set -euo pipefail
          # agent-core 用 --skipLibCheck 避免 npm install --force 引入额外 @types 报 TS2688
          npx tsc -p packages/agent-core/tsconfig.json --skipLibCheck
          # Vite build + electron-builder
          cd apps/desktop
          npx vite build
          echo "build_type=${{ inputs.build_type }}"
          if [ "${{ inputs.build_type }}" = "nsis" ]; then
            npx electron-builder --win nsis --x64
          elif [ "${{ inputs.build_type }}" = "portable" ]; then
            npx electron-builder --win portable --x64
          elif [ "${{ inputs.build_type }}" = "all" ]; then
            npx electron-builder --win nsis portable --x64
          else
            echo "Unknown build_type: ${{ inputs.build_type }}"
            exit 2
          fi

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          VER="$(node -p "require('./apps/desktop/package.json').version")"
          TAG="desktop-v${VER}"
          TITLE="Desktop v${VER}"
          echo "version=${VER}  tag=${TAG}"

          # 仅上传 NSIS 安装包（IDE.Setup.*.exe），不上传 portable exe
          SETUP_EXE="$(find apps/desktop/out -maxdepth 1 -name '*Setup*.exe' -print | head -n 1 || true)"
          if [ -z "${SETUP_EXE:-}" ]; then
            echo "NSIS setup exe not found under apps/desktop/out"
            find apps/desktop/out -maxdepth 1 -name '*.exe' -print || true
            exit 3
          fi
          BLOCKMAP="${SETUP_EXE}.blockmap"

          # 创建或复用 release
          gh release view "${TAG}" >/dev/null 2>&1 || gh release create "${TAG}" -t "${TITLE}" -n "" --latest=false
          echo "uploading: ${SETUP_EXE}"
          gh release upload "${TAG}" "${SETUP_EXE}" --clobber
          if [ -f "${BLOCKMAP}" ]; then
            gh release upload "${TAG}" "${BLOCKMAP}" --clobber
          fi
