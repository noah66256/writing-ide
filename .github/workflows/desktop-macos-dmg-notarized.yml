name: Desktop macOS DMG (Signed & Notarized)

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "Build arch"
        required: true
        default: "arm64"
        type: choice
        options:
          - arm64
          - x64
          - universal

permissions:
  contents: read

jobs:
  build-sign-notarize:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Fix npm optional deps (rollup/esbuild native for macOS)
        # 说明：
        # - 我们的 package-lock 主要在 Windows 上生成，可能缺少 darwin 平台 optional deps 的 lock 记录
        # - Rollup v4 / esbuild 依赖平台包（@rollup/rollup-darwin-arm64、@esbuild/darwin-arm64）
        run: |
          set -euo pipefail
          node -e "const lock=require('./package-lock.json'); const v=lock?.packages?.['node_modules/rollup']?.version||''; console.log(v||'');" > /tmp/rollup_ver.txt
          node -e "const lock=require('./package-lock.json'); const v=lock?.packages?.['node_modules/esbuild']?.version||''; console.log(v||'');" > /tmp/esbuild_ver.txt
          ROLLUP_VER="$(cat /tmp/rollup_ver.txt | tr -d '\r' | head -n 1)"
          ESBUILD_VER="$(cat /tmp/esbuild_ver.txt | tr -d '\r' | head -n 1)"
          echo "rollup_ver=${ROLLUP_VER}"
          echo "esbuild_ver=${ESBUILD_VER}"
          npm i --no-save --no-package-lock \
            "@rollup/rollup-darwin-arm64@${ROLLUP_VER:-latest}" \
            "@esbuild/darwin-arm64@${ESBUILD_VER:-latest}" \
            --no-audit --no-fund

      - name: Import Developer ID certificate (codesign)
        # 必填 Secrets（GitHub Repo Settings → Secrets and variables → Actions）：
        # - MACOS_CERT_P12_BASE64: Developer ID Application 证书 .p12 的 base64
        # - MACOS_CERT_PASSWORD: .p12 密码
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_CERT_P12_BASE64:-}" ] || [ -z "${MACOS_CERT_PASSWORD:-}" ]; then
            echo "Missing secrets: MACOS_CERT_P12_BASE64 / MACOS_CERT_PASSWORD"
            exit 2
          fi

          KEYCHAIN_PASSWORD="$(uuidgen)"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"

          echo "${MACOS_CERT_P12_BASE64}" | base64 --decode > "$RUNNER_TEMP/cert.p12"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -t 21600 -u "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

          security import "$RUNNER_TEMP/cert.p12" -k "${KEYCHAIN_PATH}" -P "${MACOS_CERT_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "${KEYCHAIN_PATH}"
          security default-keychain -d user -s "${KEYCHAIN_PATH}"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

          security find-identity -v -p codesigning "${KEYCHAIN_PATH}"

          echo "CSC_KEYCHAIN=${KEYCHAIN_PATH}" >> "$GITHUB_ENV"
          echo "CSC_KEYCHAIN_PASSWORD=${KEYCHAIN_PASSWORD}" >> "$GITHUB_ENV"

      - name: Clean output
        run: rm -rf apps/desktop/out

      - name: Build DMG (signed)
        # electron-builder 会从 keychain 自动发现 Developer ID Application 身份并签名
        env:
          CSC_KEYCHAIN: ${{ env.CSC_KEYCHAIN }}
          CSC_KEYCHAIN_PASSWORD: ${{ env.CSC_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          echo "arch=${{ inputs.arch }}"
          if [ "${{ inputs.arch }}" = "arm64" ]; then
            npm run dist:desktop:mac
          elif [ "${{ inputs.arch }}" = "x64" ]; then
            npm run dist:desktop:mac:x64
          elif [ "${{ inputs.arch }}" = "universal" ]; then
            npm run dist:desktop:mac:universal
          else
            echo "Unknown arch: ${{ inputs.arch }}"
            exit 2
          fi

          echo "== out =="
          ls -la apps/desktop/out || true
          echo "== dmg =="
          find apps/desktop/out -maxdepth 2 -name "*.dmg" -print || true

      - name: Notarize + staple DMG
        # 推荐使用 App Store Connect API Key（更适合 CI）
        # 必填 Secrets：
        # - APPLE_API_KEY_P8: App Store Connect API Key (.p8) 的原文（可直接粘贴到 secret，包含 BEGIN/END）
        # - APPLE_API_KEY_ID: Key ID（10位）
        # - APPLE_API_ISSUER: Issuer ID（UUID）
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_API_KEY_P8:-}" ] || [ -z "${APPLE_API_KEY_ID:-}" ] || [ -z "${APPLE_API_ISSUER:-}" ]; then
            echo "Missing secrets: APPLE_API_KEY_P8 / APPLE_API_KEY_ID / APPLE_API_ISSUER"
            exit 2
          fi

          DMG_PATH="$(find apps/desktop/out -maxdepth 2 -name '*.dmg' -print | head -n 1 || true)"
          if [ -z "${DMG_PATH:-}" ]; then
            echo "DMG not found under apps/desktop/out"
            exit 3
          fi

          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          printf "%s" "${APPLE_API_KEY_P8}" > "${KEY_PATH}"

          echo "Submitting for notarization: ${DMG_PATH}"
          xcrun notarytool submit "${DMG_PATH}" --key "${KEY_PATH}" --key-id "${APPLE_API_KEY_ID}" --issuer "${APPLE_API_ISSUER}" --wait

          echo "Stapling ticket: ${DMG_PATH}"
          xcrun stapler staple "${DMG_PATH}"
          xcrun stapler validate "${DMG_PATH}" || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-notarized-${{ inputs.arch }}
          path: |
            apps/desktop/out/**/*.dmg
            apps/desktop/out/**/*.zip
            apps/desktop/out/**/builder-debug.yml
            apps/desktop/out/**/latest*.yml
          if-no-files-found: error


