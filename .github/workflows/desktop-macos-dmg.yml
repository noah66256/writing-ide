name: Desktop macOS DMG

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "Build arch"
        required: true
        default: "arm64"
        type: choice
        options:
          - arm64
          - x64
          - universal

permissions:
  contents: write

jobs:
  build:
    # 说明：macOS 的 dmg 需要 hdiutil，建议在 macOS runner 上构建
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Fix npm optional deps (rollup/esbuild native for macOS)
        # 说明：
        # - 我们的 package-lock 主要在 Windows 上生成，可能缺少 darwin 平台 optional deps 的 lock 记录
        # - Rollup v4 / esbuild 依赖平台包（@rollup/rollup-darwin-arm64、@esbuild/darwin-arm64）
        # - 在 macOS runner 上若缺失会直接导致 Vite build 崩溃
        run: |
          set -euo pipefail
          node -e "const lock=require('./package-lock.json'); const v=lock?.packages?.['node_modules/rollup']?.version||''; console.log(v||'');" > /tmp/rollup_ver.txt
          node -e "const lock=require('./package-lock.json'); const v=lock?.packages?.['node_modules/esbuild']?.version||''; console.log(v||'');" > /tmp/esbuild_ver.txt
          ROLLUP_VER="$(cat /tmp/rollup_ver.txt | tr -d '\r' | head -n 1)"
          ESBUILD_VER="$(cat /tmp/esbuild_ver.txt | tr -d '\r' | head -n 1)"
          echo "rollup_ver=${ROLLUP_VER}"
          echo "esbuild_ver=${ESBUILD_VER}"
          # 只补当前 runner 平台需要的包（macos-14 为 arm64）
          npm i --no-save --no-package-lock \
            "@rollup/rollup-darwin-arm64@${ROLLUP_VER:-latest}" \
            "@esbuild/darwin-arm64@${ESBUILD_VER:-latest}" \
            --no-audit --no-fund

      - name: Clean output
        run: rm -rf apps/desktop/out

      - name: Build DMG
        env:
          # 没有签名证书时，明确关闭自动发现，避免构建期卡在 codesign/notarize 相关逻辑
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          set -euo pipefail
          echo "arch=${{ inputs.arch }}"
          if [ "${{ inputs.arch }}" = "arm64" ]; then
            npm run dist:desktop:mac
          elif [ "${{ inputs.arch }}" = "x64" ]; then
            npm run dist:desktop:mac:x64
          elif [ "${{ inputs.arch }}" = "universal" ]; then
            npm run dist:desktop:mac:universal
          else
            echo "Unknown arch: ${{ inputs.arch }}"
            exit 2
          fi

      - name: Upload to GitHub Release (bypass artifacts quota)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VER="$(node -e \"console.log(require('./apps/desktop/package.json').version)\")"
          TAG="desktop-v${VER}"
          TITLE="Desktop v${VER}"
          echo "version=${VER}"
          echo "tag=${TAG}"
          DMG_PATH="$(find apps/desktop/out -maxdepth 2 -name '*.dmg' -print | head -n 1 || true)"
          ZIP_PATH="$(find apps/desktop/out -maxdepth 2 -name '*.zip' -print | head -n 1 || true)"
          if [ -z \"${DMG_PATH:-}\" ]; then
            echo \"DMG not found under apps/desktop/out\"
            exit 3
          fi
          echo \"dmg=${DMG_PATH}\"
          echo \"zip=${ZIP_PATH}\"
          gh release view \"${TAG}\" >/dev/null 2>&1 || gh release create \"${TAG}\" -t \"${TITLE}\" -n \"\" --latest=false
          gh release upload \"${TAG}\" \"${DMG_PATH}\" --clobber
          if [ -n \"${ZIP_PATH:-}\" ]; then
            gh release upload \"${TAG}\" \"${ZIP_PATH}\" --clobber
          fi


